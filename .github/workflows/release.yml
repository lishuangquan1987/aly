name: Release Build

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如 v0.0.1)'
        required: true
        type: string

jobs:
  build-server:
    name: Build zap-server (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: windows-latest
    strategy:
      matrix:
        goos: [windows, linux, darwin]
        goarch: [amd64]
        include:
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
        continue-on-error: true

      - name: Fallback — download Go
        if: failure()
        shell: cmd
        run: |
          echo "setup-go could not resolve Go version from go.mod, using latest..."
          powershell -Command "& {$(Invoke-WebRequest -Uri 'https://go.dev/dl/go1.23.0.windows-amd64.zip' -OutFile 'C:\go.zip'); Expand-Archive -Path 'C:\go.zip' -DestinationPath 'C:\go' -Force}"
          echo "C:\go\bin" >> %GITHUB_PATH%

      - name: Verify Go version
        run: go version

      - name: Build zap-server
        shell: cmd
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          cd server
          set EXT=
          if /I "%GOOS%"=="windows" set EXT=.exe
          set OUT=zap-server-%GOOS%-%GOARCH%%EXT%
          go build -ldflags="-s -w" -o %OUT% .

      - name: Upload zap-server artifact
        uses: actions/upload-artifact@v4
        with:
          name: zap-server-${{ matrix.goos }}-${{ matrix.goarch }}
          path: server/zap-server-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goos == 'windows' && '.exe' || '' }}

  build-zap-publish:
    name: Build zap-publish (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: windows-latest
    strategy:
      matrix:
        goos: [windows, linux, darwin]
        goarch: [amd64]
        include:
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: publish/publish-cli/go.mod
        continue-on-error: true

      - name: Fallback — download Go
        if: failure()
        shell: cmd
        run: |
          echo "setup-go could not resolve Go version from go.mod, using latest..."
          powershell -Command "& {$(Invoke-WebRequest -Uri 'https://go.dev/dl/go1.23.0.windows-amd64.zip' -OutFile 'C:\go.zip'); Expand-Archive -Path 'C:\go.zip' -DestinationPath 'C:\go' -Force}"
          echo "C:\go\bin" >> %GITHUB_PATH%

      - name: Verify Go version
        run: go version

      - name: Build zap-publish
        shell: cmd
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          cd publish\publish-cli
          set EXT=
          if /I "%GOOS%"=="windows" set EXT=.exe
          set OUT=zap-publish-%GOOS%-%GOARCH%%EXT%
          go build -ldflags="-s -w" -o %OUT% .

      - name: Upload zap-publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: zap-publish-${{ matrix.goos }}-${{ matrix.goarch }}
          path: publish/publish-cli/zap-publish-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goos == 'windows' && '.exe' || '' }}

  build-zap-client:
    name: Build zap-client (Windows XP / 32-bit)
    runs-on: windows-latest
    env:
      GOPATH: C:\Users\runneradmin\go

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go 1.10
        id: setup-go
        uses: actions/setup-go@v5
        with:
          go-version: '1.10.8'
        continue-on-error: true

      - name: Fallback — manual Go 1.10 install
        if: steps.setup-go.outcome == 'failure'
        shell: cmd
        run: |
          echo "setup-go could not find Go 1.10, downloading manually..."
          curl -fsSL -o go1.10.8.windows-amd64.zip https://go.dev/dl/go1.10.8.windows-amd64.zip
          powershell -Command "Expand-Archive -Path go1.10.8.windows-amd64.zip -DestinationPath C:\go110"
          echo "C:\go110\bin" >> %GITHUB_PATH%
          if "%GOPATH%"=="" setx GOPATH C:\Users\runneradmin\go

      - name: Verify Go version
        run: go version

      - name: Setup GOPATH structure
        shell: cmd
        run: |
          mkdir "%GOPATH%\src\zap\client"
          xcopy /e /i /y client\zap-client "%GOPATH%\src\zap\client\zap-client"

      - name: Install deps & Build (32-bit, XP compatible)
        shell: cmd
        run: |
          set GOOS=windows
          set GOARCH=386
          set GO111MODULE=off
          go build -ldflags="-s -w" -o zap-client.exe zap/client/zap-client

      - name: Upload zap-client artifact
        uses: actions/upload-artifact@v4
        with:
          name: zap-client-win-xp
          path: zap-client.exe

  publish-sdk-nuget:
    name: Publish ZapClient.CSharpSDK to NuGet
    needs: build-zap-client
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: cmd
        run: |
          if "${{ github.event_name }}"=="workflow_dispatch" (
            set RAW=${{ inputs.version }}
          ) else (
            set RAW=${{ github.event.release.tag_name }}
          )
          :: Strip leading 'v' for NuGet semver compatibility
          set ZAP_VERSION=%RAW:v=%
          echo ZAP_VERSION=%ZAP_VERSION%>> %GITHUB_ENV%

      - name: Download zap-client artifact
        uses: actions/download-artifact@v4
        with:
          name: zap-client-win-xp

      - name: Copy zap-client.exe to SDK project
        shell: cmd
        run: |
          mkdir client\zap-client-sdk\ZapClient.CSharpSDK\ZapClient.CSharpSDK\build\UpdateFolder
          copy zap-client.exe client\zap-client-sdk\ZapClient.CSharpSDK\ZapClient.CSharpSDK\build\UpdateFolder\zap-client.exe
          copy client\zap-client\client.json client\zap-client-sdk\ZapClient.CSharpSDK\ZapClient.CSharpSDK\build\UpdateFolder\client.json

      - name: Build & Pack SDK
        shell: cmd
        run: |
          cd client\zap-client-sdk\ZapClient.CSharpSDK\ZapClient.CSharpSDK
          dotnet pack --configuration Release -o nupkg -p:Version=%ZAP_VERSION%

      - name: Verify nupkg
        shell: cmd
        run: |
          dir client\zap-client-sdk\ZapClient.CSharpSDK\ZapClient.CSharpSDK\nupkg\

      - name: Publish to NuGet
        shell: cmd
        run: |
          dotnet nuget push "client\zap-client-sdk\ZapClient.CSharpSDK\ZapClient.CSharpSDK\nupkg\*.nupkg" --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json

  upload-release-assets:
    name: Upload to Release
    needs: [build-server, build-zap-publish, build-zap-client]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: List downloaded artifacts
        run: ls -laR

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Upload to Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          gh release upload "$TAG" \
            zap-server-windows-amd64/zap-server-windows-amd64.exe \
            zap-server-linux-amd64/zap-server-linux-amd64 \
            zap-server-linux-arm64/zap-server-linux-arm64 \
            zap-server-darwin-amd64/zap-server-darwin-amd64 \
            zap-server-darwin-arm64/zap-server-darwin-arm64 \
            zap-publish-windows-amd64/zap-publish-windows-amd64.exe \
            zap-publish-linux-amd64/zap-publish-linux-amd64 \
            zap-publish-linux-arm64/zap-publish-linux-arm64 \
            zap-publish-darwin-amd64/zap-publish-darwin-amd64 \
            zap-publish-darwin-arm64/zap-publish-darwin-arm64 \
            zap-client-win-xp/zap-client.exe \
            --clobber
