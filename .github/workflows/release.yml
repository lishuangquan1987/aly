name: Release Build

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如 v0.0.1)'
        required: true
        type: string

jobs:
  build-server:
    name: Build Server (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: windows-latest
    strategy:
      matrix:
        goos: [windows, linux, darwin]
        goarch: [amd64]
        include:
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
        continue-on-error: true

      - name: Fallback — download Go
        if: failure()
        shell: cmd
        run: |
          echo "setup-go could not resolve Go version from go.mod, using latest..."
          powershell -Command "& {$(Invoke-WebRequest -Uri 'https://go.dev/dl/go1.23.0.windows-amd64.zip' -OutFile 'C:\go.zip'); Expand-Archive -Path 'C:\go.zip' -DestinationPath 'C:\go' -Force}"
          echo "C:\go\bin" >> %GITHUB_PATH%

      - name: Verify Go version
        run: go version

      - name: Build server
        shell: cmd
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          cd server
          set EXT=
          if /I "%GOOS%"=="windows" set EXT=.exe
          set OUT=server-%GOOS%-%GOARCH%%EXT%
          go build -ldflags="-s -w" -o %OUT% ./cmd

      - name: Upload server artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-${{ matrix.goos }}-${{ matrix.goarch }}
          path: server/server-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goos == 'windows' && '.exe' || '' }}

  build-publish-cli:
    name: Build publish-cli (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: windows-latest
    strategy:
      matrix:
        goos: [windows, linux, darwin]
        goarch: [amd64]
        include:
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: publish-cli/go.mod
        continue-on-error: true

      - name: Fallback — download Go
        if: failure()
        shell: cmd
        run: |
          echo "setup-go could not resolve Go version from go.mod, using latest..."
          powershell -Command "& {$(Invoke-WebRequest -Uri 'https://go.dev/dl/go1.23.0.windows-amd64.zip' -OutFile 'C:\go.zip'); Expand-Archive -Path 'C:\go.zip' -DestinationPath 'C:\go' -Force}"
          echo "C:\go\bin" >> %GITHUB_PATH%

      - name: Verify Go version
        run: go version

      - name: Build publish-cli
        shell: cmd
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          cd publish-cli
          set EXT=
          if /I "%GOOS%"=="windows" set EXT=.exe
          set OUT=publish-cli-%GOOS%-%GOARCH%%EXT%
          go build -ldflags="-s -w" -o %OUT% ./cmd/publish-cli

      - name: Upload publish-cli artifact
        uses: actions/upload-artifact@v4
        with:
          name: publish-cli-${{ matrix.goos }}-${{ matrix.goarch }}
          path: publish-cli/publish-cli-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goos == 'windows' && '.exe' || '' }}

  build-client:
    name: Build Client (Windows XP / 32-bit)
    runs-on: windows-latest
    env:
      GOPATH: C:\Users\runneradmin\go

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go 1.10
        id: setup-go
        uses: actions/setup-go@v5
        with:
          go-version: '1.10.8'
        continue-on-error: true

      - name: Fallback — manual Go 1.10 install
        if: steps.setup-go.outcome == 'failure'
        shell: cmd
        run: |
          echo "setup-go could not find Go 1.10, downloading manually..."
          curl -fsSL -o go1.10.8.windows-amd64.zip https://go.dev/dl/go1.10.8.windows-amd64.zip
          powershell -Command "Expand-Archive -Path go1.10.8.windows-amd64.zip -DestinationPath C:\go110"
          echo "C:\go110\bin" >> %GITHUB_PATH%
          if "%GOPATH%"=="" setx GOPATH C:\Users\runneradmin\go

      - name: Verify Go version
        run: go version

      - name: Setup GOPATH structure
        shell: cmd
        run: |
          mkdir "%GOPATH%\src\clientupdator"
          xcopy /e /i /y client "%GOPATH%\src\clientupdator\client"

      - name: Install deps & Build (32-bit, XP compatible)
        shell: cmd
        run: |
          set GOOS=windows
          set GOARCH=386
          set GO111MODULE=off
          go get gopkg.in/yaml.v2
          go build -ldflags="-s -w" -o client-updator.exe clientupdator/client

      - name: Upload client artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-updator-win-xp
          path: client-updator.exe

  upload-release-assets:
    name: Upload to Release
    needs: [build-server, build-publish-cli, build-client]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: List downloaded artifacts
        run: ls -laR

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Upload to Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          gh release upload "$TAG" \
            server-windows-amd64/server-windows-amd64.exe \
            server-linux-amd64/server-linux-amd64 \
            server-linux-arm64/server-linux-arm64 \
            server-darwin-amd64/server-darwin-amd64 \
            server-darwin-arm64/server-darwin-arm64 \
            publish-cli-windows-amd64/publish-cli-windows-amd64.exe \
            publish-cli-linux-amd64/publish-cli-linux-amd64 \
            publish-cli-linux-arm64/publish-cli-linux-arm64 \
            publish-cli-darwin-amd64/publish-cli-darwin-amd64 \
            publish-cli-darwin-arm64/publish-cli-darwin-arm64 \
            client-updator-win-xp/client-updator.exe \
            --clobber
