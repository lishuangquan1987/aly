name: Build Client (Go 1.10 / XP)

on:
  push:
    paths:
      - 'client/**'
      - '.github/workflows/build-client.yml'
  pull_request:
    paths:
      - 'client/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go 1.10
        id: setup-go
        uses: actions/setup-go@v5
        with:
          go-version: '1.10.8'
        continue-on-error: true

      - name: Fallback — manual Go 1.10 install
        if: steps.setup-go.outcome == 'failure'
        shell: cmd
        run: |
          echo "setup-go could not find Go 1.10, downloading manually..."
          curl -fsSL -o go1.10.8.windows-amd64.zip https://go.dev/dl/go1.10.8.windows-amd64.zip
          powershell -Command "Expand-Archive -Path go1.10.8.windows-amd64.zip -DestinationPath C:\go110"
          echo "C:\go110\bin" >> %GITHUB_PATH%
          :: Set GOPATH to a default if setup-go didn't set it
          if "%GOPATH%"=="" setx GOPATH C:\Users\runneradmin\go

      - name: Verify Go version
        run: go version

      - name: Setup GOPATH structure
        shell: cmd
        run: |
          mkdir "%GOPATH%\src\clientupdator"
          xcopy /e /i /y client "%GOPATH%\src\clientupdator\client"

      - name: Build (32-bit, XP compatible)
        shell: cmd
        run: |
          set GOOS=windows
          set GOARCH=386
          set GO111MODULE=off
          go build -ldflags="-s -w" -o client-updator.exe clientupdator/client

      - name: Copy artifact
        shell: cmd
        run: |
          copy /y client-updator.exe client\client-updator.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-updator-xp
          path: client/client-updator.exe
