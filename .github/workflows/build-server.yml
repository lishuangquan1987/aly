name: Build Server

on:
  workflow_dispatch:

jobs:
  build:
    name: Build Server
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
        continue-on-error: true

      - name: Fallback — download Go
        if: failure()
        shell: cmd
        run: |
          echo "setup-go could not resolve Go version from go.mod, using latest..."
          powershell -Command "& {$(Invoke-WebRequest -Uri 'https://go.dev/dl/go1.23.0.windows-amd64.zip' -OutFile 'C:\go.zip'); Expand-Archive -Path 'C:\go.zip' -DestinationPath 'C:\go' -Force}"
          echo "C:\go\bin" >> %GITHUB_PATH%

      - name: Verify Go version
        run: go version

      - name: Build server
        shell: cmd
        run: |
          cd server
          go build -ldflags="-s -w" -o server.exe ./cmd

      - name: Upload server artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-windows-amd64
          path: server/server.exe
